<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#3B82F6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>AquaTrack</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/images/icon-192.png">
    <link rel="apple-touch-icon" href="/images/icon-192.png">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        body { display: grid; place-items: center; min-height: 100dvh; }
        .splash {
            text-align: center; animation: fadeIn 0.5s ease;
        }
        .splash-icon {
            width: 80px; height: 80px; border-radius: 24px;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            display: grid; place-items: center; font-size: 2.2rem;
            margin: 0 auto 20px;
            box-shadow: 0 12px 32px rgba(59,130,246,0.4);
            animation: pulse 2s ease-in-out infinite;
        }
        .splash h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; }
        .splash p { color: var(--text-secondary); margin-top: 6px; }
        .splash .spinner { margin: 24px auto 0; }
    </style>
</head>
<body>
    <div class="splash">
        <div class="splash-icon">💧</div>
        <h1>AquaTrack</h1>
        <p>Family water dispenser manager</p>
        <div class="spinner"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
    <script src="/config/config.js"></script>
    <script src="/firebase/firebase.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        App.initTheme();
        const { db, auth } = initFirebase();

        // Redirect based on auth state
        const timer = setTimeout(() => window.location.href = 'login.html', 5000);

        auth.onAuthStateChanged(async user => {
            clearTimeout(timer);
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            // Load profile to get role
            try {
                const doc = await db.collection(CONFIG.COLLECTIONS.USERS).doc(user.uid).get();
                const role = doc.exists ? doc.data().role : isApprover(user.email) ? 'approver' : 'user';
                window.location.href = role === 'approver' ? 'admin.html' : 'dashboard.html';
            } catch (e) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
