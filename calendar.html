<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#3B82F6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AquaTrack — Calendar</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/images/icon-192.png">
    <link rel="apple-touch-icon" href="/images/icon-192.png">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .calendar-page-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 20px;
            align-items: start;
        }
        @media (max-width: 900px) {
            .calendar-page-grid { grid-template-columns: 1fr; }
        }
        .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--text-secondary); }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>
<!-- Confirm Dialog -->
<div class="modal-overlay" id="confirm-overlay">
    <div class="modal" style="max-width:380px">
        <div class="modal-header"><h3 class="confirm-title">Confirm</h3></div>
        <p class="confirm-msg" style="margin-bottom:0"></p>
        <div class="modal-footer">
            <button class="btn btn-ghost btn-sm confirm-cancel">Cancel</button>
            <button class="btn btn-primary btn-sm confirm-ok">Confirm</button>
        </div>
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightbox">
    <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('open')">✕</button>
    <img src="" alt="Photo" class="lightbox-img">
</div>

<div class="app-shell">
    <!-- Sidebar -->
    <nav class="sidebar">
        <a class="sidebar-logo" href="#">
            <div class="logo-icon">💧</div>
            <span>AquaTrack</span>
        </a>
        <span class="nav-group-label">Main</span>
        <a class="nav-item" id="back-link" href="dashboard.html">
            <span class="nav-icon">🏠</span> Dashboard
        </a>
        <a class="nav-item active" href="calendar.html">
            <span class="nav-icon">📅</span> Calendar
        </a>
        <div style="margin-top:auto;padding-top:16px">
            <button class="theme-toggle" style="width:100%;margin-bottom:10px" onclick="App.toggleTheme()">
                <span class="theme-toggle-icon">☀️</span> Toggle Theme
            </button>
            <div class="sidebar-user">
                <div class="user-avatar-sm" data-user-avatar></div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" data-user-name>Loading…</div>
                    <div class="sidebar-user-role" data-user-role></div>
                </div>
                <button onclick="Auth.signOut()" style="background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text-tertiary)" title="Sign out">↩</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="topbar">
            <div class="topbar-title">
                <h2>📅 Calendar</h2>
                <p>View refill history and activity by day</p>
            </div>
            <div class="topbar-actions">
                <button class="btn btn-ghost btn-sm" id="back-btn">← Back</button>
            </div>
        </div>

        <!-- Legend -->
        <div class="legend" style="margin-bottom:20px">
            <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Approved</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> Pending</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Rejected</div>
            <div class="legend-item"><div class="legend-dot" style="background:var(--orange);opacity:0.6"></div> Warning</div>
        </div>

        <div class="calendar-page-grid">
            <!-- Calendar -->
            <div class="card">
                <div id="calendar-wrapper">
                    <div class="loading-center"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- Day Detail -->
            <div class="card" style="position:sticky;top:20px">
                <h3 style="margin-bottom:16px">Day Detail</h3>
                <div id="day-detail">
                    <div class="empty-state" style="padding:32px 0">
                        <div class="empty-icon">👆</div>
                        <h3>Select a day</h3>
                        <p>Tap any day on the calendar to see its activity.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
    <div class="bottom-nav-inner">
        <a class="bottom-nav-item" id="bottom-back" href="dashboard.html">
            <span class="nav-icon">🏠</span> Home
        </a>
        <a class="bottom-nav-item active" href="calendar.html">
            <span class="nav-icon">📅</span> Calendar
        </a>
        <button class="bottom-nav-item" onclick="Calendar.prevMonth()">
            <span class="nav-icon">‹</span> Prev
        </button>
        <button class="bottom-nav-item" onclick="Calendar.nextMonth()">
            <span class="nav-icon">›</span> Next
        </button>
    </div>
</nav>

<div class="toast-container" id="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
<script src="/config/config.js"></script>
<script src="/firebase/firebase.js"></script>
<script src="/js/app.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/calendar.js"></script>
<script>
    const { db, auth, storage, messaging } = initFirebase();
    App.initTheme();
    App.initLightbox();
    Auth.init();

    auth.onAuthStateChanged(user => {
        if (!user) return;
        Auth.updateUIForUser();
        // Set correct back link based on role
        const backHref = Auth.isApproverUser() ? 'admin.html' : 'dashboard.html';
        document.getElementById('back-link').href = backHref;
        document.getElementById('back-btn').onclick = () => window.location.href = backHref;
        document.getElementById('bottom-back').href = backHref;
        // Init calendar
        Calendar.init();
    });

    document.getElementById('lightbox').addEventListener('click', e => {
        if (e.target === document.getElementById('lightbox')) {
            document.getElementById('lightbox').classList.remove('open');
        }
    });
</script>
</body>
</html>
